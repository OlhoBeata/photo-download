<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Download</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <img id="photo" alt="Photo">

    <h2>Your photo is ready!</h2>

    <p>
        Before downloading your photo, please confirm that you have read and
        agree to our
        <a href="https://olhodabeata.com/privacy-policy" target="_blank">Privacy Policy</a>
        and
        <a href="https://olhodabeata.com/terms-and-conditions" target="_blank">Terms & Conditions</a>.
    </p>

    <label class="checkbox">
        <input type="checkbox" id="agree">
        I agree.
    </label>

    <button id="download" disabled>
        Download Photo
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
