<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olho da Beata - Enviar Fotografia</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:40px auto;
    padding:20px;
    text-align:center;
    background:#f5f5f5;
}

.card{
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
}

button{
    padding:12px 22px;
    font-size:16px;
    margin:10px;
    cursor:pointer;
}

#qrcode{
    margin-top:20px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="card">

<h2>📷 Olho da Beata</h2>

<input type="file" id="file" accept="image/*">

<div id="status"></div>

</div>

<script>

emailjs.init({
    publicKey:"DZvSwJYHfKTlYvasH"
});

const cloudName="lim5fdgq";
const uploadPreset="olhodabeata_upload";

const fileInput=document.getElementById("file");
const status=document.getElementById("status");

fileInput.addEventListener("change",async()=>{

const file=fileInput.files[0];

if(!file) return;

status.innerHTML="<h3>⏳ A enviar fotografia...</h3>";

const formData=new FormData();
formData.append("file",file);
formData.append("upload_preset",uploadPreset);

const response=await fetch(
`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
{
method:"POST",
body:formData
});

const data=await response.json();

const publicId=data.public_id;

const downloadLink=
`https://download.olhodabeata.com/?photo=${publicId}`;

status.innerHTML=`

<h2>✅ Fotografia pronta</h2>

<p><strong>Email do cliente</strong></p>

<input
type="email"
id="customerEmail"
placeholder="cliente@email.com">

<br>

<button id="sendEmail">
📧 Enviar Fotografia
</button>

<button id="copy">
📋 Copiar Link
</button>

<p>

<a href="${downloadLink}" target="_blank">
Abrir página de download
</a>

</p>

<div id="qrcode"></div>

`;

new QRCode(document.getElementById("qrcode"),{
text:downloadLink,
width:220,
height:220
});

document.getElementById("copy").onclick=()=>{

navigator.clipboard.writeText(downloadLink);

alert("Link copiado.");

};

document.getElementById("sendEmail").onclick=async()=>{

const email=document.getElementById("customerEmail").value;

if(email==""){

alert("Introduza o email do cliente.");

return;

}

await emailjs.send(

"service_87s5784",

"template_34q2y45",

{

download_link:downloadLink,

to_email:email

}

);

alert("✅ Email enviado com sucesso!");

};

});

</script>

</body>
</html>
